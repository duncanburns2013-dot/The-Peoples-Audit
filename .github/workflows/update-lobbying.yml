name: Refresh MA Lobbying Data

on:
  schedule:
    # Every Sunday at 5am UTC
    - cron: '0 5 * * 0'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: 'fetch-lobbying'
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm install playwright
          npx playwright install --with-deps chromium

      - name: Run lobbying scraper
        run: node scripts/fetch-ma-lobbying.mjs
        timeout-minutes: 15

      - name: Show output (debug)
        run: |
          echo "----- ma-lobbying.json -----"
          head -c 4000 public/data/ma-lobbying.json || true
          echo
          echo "----------------------------"

      - name: Commit & push if changed
        run: |
          git config user.name  "the-peoples-audit-bot"
          git config user.email "actions@users.noreply.github.com"
          if git diff --quiet -- public/data/ma-lobbying.json; then
            echo "No lobbying data changes."
            exit 0
          fi
          git add public/data/ma-lobbying.json
          git commit -m "chore(data): refresh MA lobbying data"
          git push
