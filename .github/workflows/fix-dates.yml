name: Fix OCPF Date Parsing

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify date parsing
        run: |
          echo "Date parsing fixes are already applied in api.js and App.jsx."
          echo "This workflow is retained for manual re-runs if needed."
          grep -c "parseOcpfDate" src/services/api.js || echo "parseOcpfDate not found"
