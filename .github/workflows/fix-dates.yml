name: Fix OCPF Date Parsing
on:
  workflow_dispatch:
    push:
        paths:
              - '.github/workflows/fix-dates.yml'
              jobs:
                fix:
                    runs-on: ubuntu-latest
                        permissions:
                              contents: write
                                  steps:
                                        - uses: actions/checkout@v4
                                              - name: Fix date parsing in api.js
                                                      run: |
                                                                python3 << 'PYEOF'
                                                                          import re
                                                                                    with open('src/services/api.js', 'r') as f:
                                                                                                  c = f.read()
                                                                                                            old_comment = """/**
                                                                                                             * Fetch the most recent contribution date for a given filer (legislator/candidate).
                                                                                                              * OCPF returns oldest-first with no server-side sort, so we use a narrow window strategy:
                                                                                                               *   1. Try current year first (small result set \u2192 max date is accurate)
                                                                                                                *   2. If nothing, try previous year
                                                                                                                 *   3. If still nothing, try 2 years back
                                                                                                                  * Returns { cpfId, lastContribDate: 'YYYY-MM-DD' | null, lastContribAmount, lastContributor }
                                                                                                                   */"""
                                                                                                                             new_block = """/**
                                                                                                                              * Parse OCPF date string (M/D/YYYY) into epoch ms for proper comparison.
                                                                                                                               * OCPF returns dates like "4/10/2026" \u2014 string comparison breaks on this format.
                                                                                                                                */
                                                                                                                                function parseOcpfDate(str) {
                                                                                                                                  if (!str) return 0;
                                                                                                                                    const parts = str.split('/');
                                                                                                                                      if (parts.length === 3) return new Date(+parts[2], +parts[0] - 1, +parts[1]).getTime();
                                                                                                                                        return new Date(str).getTime() || 0;
                                                                                                                                        }
                                                                                                                                        
                                                                                                                                        /**
                                                                                                                                         * Fetch the most recent contribution for a given filer (legislator/candidate).
                                                                                                                                          * OCPF dates are M/D/YYYY and the API returns oldest-first, so we:
                                                                                                                                           *   1. Fetch current year first (small result set)
                                                                                                                                            *   2. Parse dates properly for comparison (string compare fails on M/D/YYYY)
                                                                                                                                             *   3. Fall back to prior years if nothing found
                                                                                                                                              * Returns { cpfId, lastContribDate, lastContribAmount, lastContributor }
                                                                                                                                               */"""
                                                                                                                                                         c = c.replace(old_comment, new_block)
                                                                                                                                                                   c = c.replace(
                                                                                                                                                                                 "      // Find the most recent by date (API returns oldest-first)\n      let newest = items[0];\n      for (let i = 1; i < items.length; i++) {\n        if ((items[i].date || '') > (newest.date || '')) newest = items[i];\n      }",
                                                                                                                                                                                               "      // Find the most recent by parsing OCPF M/D/YYYY dates properly\n      let newest = items[0];\n      let newestTime = parseOcpfDate(newest.date);\n      for (let i = 1; i < items.length; i++) {\n        const t = parseOcpfDate(items[i].date);\n        if (t > newestTime) { newest = items[i]; newestTime = t; }\n      }"
                                                                                                                                                                                                         )
                                                                                                                                                                                                                   c = c.replace(
                                                                                                                                                                                                                                 "            if ((item.date || '') > (newest.date || '')) newest = item;",
                                                                                                                                                                                                                                               "            const t = parseOcpfDate(item.date);\n            if (t > newestTime) { newest = item; newestTime = t; }"
                                                                                                                                                                                                                                                         )
                                                                                                                                                                                                                                                                   c = c.replace('// testxy', '// test')
                                                                                                                                                                                                                                                                             with open('src/services/api.js', 'w') as f:
                                                                                                                                                                                                                                                                                           f.write(c)
                                                                                                                                                                                                                                                                                                     count = c.count('parseOcpfDate')
                                                                                                                                                                                                                                                                                                               print(f'parseOcpfDate appears {count} times')
                                                                                                                                                                                                                                                                                                                         assert count == 4, f'Expected 4 occurrences, got {count}'
                                                                                                                                                                                                                                                                                                                                   assert 'YYYY-MM-DD' not in c, 'YYYY-MM-DD still present'
                                                                                                                                                                                                                                                                                                                                             print('All fixes verified!')
                                                                                                                                                                                                                                                                                                                                                       PYEOF
                                                                                                                                                                                                                                                                                                                                                             - name: Fix date sorting in App.jsx
                                                                                                                                                                                                                                                                                                                                                                     run: |
                                                                                                                                                                                                                                                                                                                                                                               python3 << 'PYEOF'
                                                                                                                                                                                                                                                                                                                                                                                         with open('src/App.jsx', 'r') as f:
                                                                                                                                                                                                                                                                                                                                                                                                       c = f.read()
                                                                                                                                                                                                                                                                                                                                                                                                                 c = c.replace(
                                                                                                                                                                                                                                                                                                                                                                                                                               "                      const dateA = lastContribMap[a.cpfId]?.date || '';\n                      const dateB = lastContribMap[b.cpfId]?.date || '';\n                      // Sort by last contribution date (newest first); fall back to receipts\n                      if (dateA || dateB) return dateB.localeCompare(dateA) || b.receipts - a.receipts;",
                                                                                                                                                                                                                                                                                                                                                                                                                                             "                      const dA = lastContribMap[a.cpfId]?.date || '';\n                      const dB = lastContribMap[b.cpfId]?.date || '';\n                      // Parse M/D/YYYY dates for proper sort (string compare fails on this format)\n                      const pA = dA ? (() => { const p = dA.split('/'); return new Date(+p[2], +p[0]-1, +p[1]).getTime(); })() : 0;\n                      const pB = dB ? (() => { const p = dB.split('/'); return new Date(+p[2], +p[0]-1, +p[1]).getTime(); })() : 0;\n                      if (pA || pB) return (pB - pA) || b.receipts - a.receipts;"
                                                                                                                                                                                                                                                                                                                                                                                                                                                       )
                                                                                                                                                                                                                                                                                                                                                                                                                                                                 with open('src/App.jsx', 'w') as f:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                               f.write(c)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         print('App.jsx sort fix applied!')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   PYEOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         - name: Commit and push fixes
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           git config user.name "github-actions[bot]"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     git config user.email "github-actions[bot]@users.noreply.github.com"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                               git add src/services/api.js src/App.jsx
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                         git diff --cached --stat
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   git commit -m "Fix OCPF date parsing - parse M/D/YYYY properly instead of string comparison
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                   
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                             Added parseOcpfDate() helper to properly parse OCPF M/D/YYYY date format.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                       String comparison of these dates was causing all legislators to show stale
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                 9/9/2025 dates instead of current contributions like 4/10/2026.
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                           Also fixed date sorting in App.jsx legislators table."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                     git push
